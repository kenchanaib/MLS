<html>

<head>
    <meta property="og:site_name" content="Hung Shui Kiu / Ha Tsuen New Development Area">
    <meta property="og:title" content="Hung Shui Kiu / Ha Tsuen New Development Area">
    <meta property="og:description" content="Hung Shui Kiu / Ha Tsuen New Development Area - AR Game">
    <meta property="og:type" content="website">
    <meta property="og:image:alt" content="AR Game">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="icon.svg" type="image/jpeg" sizes="48x48">
    <title>Hung Shui Kiu / Ha Tsuen New Development Area - AR Game</title>
    <script src="js/aframe.min.js"></script>
    <script src="js/mindar-image-aframe.prod.js"></script>
    <script src="js/aframe-extras.min.js"></script>
    <style>
        /* Ensure the scene takes up the full viewport */
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }

        #game-title {
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            /* Center horizontally */
            width: 320px;
            /* Fit 75% of screen width */
            height: auto;
            /* Maintain aspect ratio */
            z-index: 5;
            /* Below video but above AR content */
            opacity: 0;
            /* Initially invisible for fade-in */
            transition: opacity 0.5s ease;
            /* Smooth fade animation */
        }

        .arjs-loader {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
        }

        .arjs-loader div {
            text-align: center;
            font-size: 1.25em;
            color: white;
        }

        #center-container {
            position: absolute;
            display: block;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: src("");
            background-color: rgba(117 208 238);
            z-index: 5;
        }

        #myButton {
            position: fixed;
            bottom: 28%;
            left: 50%;
            width: 160px;
            /* height: 150px; */
            transform: translate(-50%, -40%);
            /* Center horizontally */
            background: transparent;
            border: none;
            cursor: pointer;
        }

        #home_title {
            position: fixed;
            top: 40%;
            left: 50%;
            width: 85vw;
            /* height: 150px; */
            transform: translate(-50%, -100%);
            /* Center horizontally */
            background: transparent;
            border: none;
            cursor: pointer;
        }

        #landingPage {
            position: fixed;
            bottom: 0%;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            transform: none !important;
            display: block;
            /* Hidden initially */
        }

        #startBtn {
            width: 100%;
            /* height: 100%; */
            vertical-align: middle;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loading-dots div {
            width: 10px;
            height: 10px;
            margin: 0 4px;
            background-color: #3498db;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots div:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dots div:nth-child(2) {
            animation-delay: -0.16s;
        }

        .loading-dots div:nth-child(3) {
            animation-delay: 0s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        #captureBtn {
            display: none;
            position: fixed;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            /* ← adjust size to match your photo.png */
            height: 80px;
            /* make it square or match image aspect */
            background: transparent;
            /* no background needed for image button */
            border: none;
            padding: 0;
            cursor: pointer;
            z-index: 1000;
            /* optional: slight shadow or glow for better visibility */
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
        }

        #captureBtn:active {
            transform: translateX(-50%) scale(0.92);
            /* subtle press effect */
            opacity: 0.85;
        }

        button {
            outline: none;
            /* Remove focus outline */
            -webkit-tap-highlight-color: transparent;
            /* Remove iOS tap highlight */
            -webkit-appearance: none;
            /* Remove default button styling */
            -moz-appearance: none;
            /* For cross-browser consistency */
            appearance: none;
            /* Standard property */
            border: none;
            /* Remove default border */
            background: #007bff;
            /* Example background */
            color: white;
            /* Example text color */
            padding: 10px 20px;
            cursor: pointer;
            /* Maintain pointer cursor */
            touch-action: manipulation;
            /* Optimize touch behavior */
        }

        /* Ensure no effect on active or focus states */
        button:focus,
        button:active {
            outline: none;
            box-shadow: none;
            /* Remove any shadow */
            background: #007bff;
            /* Keep consistent background */
            border: none;
            /* Keep consistent border */
        }
            #whiteScreen {
      background-color: black;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
      transition: opacity 0.1s ease;
      opacity: 0;
      display: none;
    }
    </style>

        <script>
        AFRAME.registerComponent('disable-culling', {
  init: function () {
    this.el.addEventListener('model-loaded', (e) => {
      const model = e.detail.model;
      model.traverse((node) => {
        if (node.isMesh) {
          node.frustumCulled = false;
        }
      });
    });
  }
});
        </script>
</head>

<body style='margin : 0px; overflow: hidden;'>
    <div id="loader" class="arjs-loader">
        <div class="loading-dots">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>
    <div id="center-container">
        <img id="landingPage" src="bg.jpg">
        <img id="home_title" src="home_title.png">
        <button id="myButton" onclick="myFunction()">
            <img id="startBtn" src="Home.png" alt="">
        </button>
    </div>
    <button id="captureBtn">
        <img src="photo.png" alt="Capture Photo" style="width:100%; height:100%; object-fit: contain;">
    </button>
    <div id="container">
    </div>
    <img id="game-title" src="title.png" alt="Game Title">
    <a-scene mindar-image="imageTargetSrc: a.mind; uiScanning:no;filterMinCF:0.0001;filterBeta:10000;"
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights;logarithmicDepthBuffer:true"
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <a-asset-item id="tree" src="./models/Brick_Animation_3.gltf"></a-asset-item>
        </a-assets>

        <a-camera id="myCam" position="0 0 -4" look-controls="enabled: false"></a-camera>

        <a-entity id="marker" mindar-image-target="targetIndex: 2" rotation="0 0 0">
            <a-gltf-model id="block" visible="true" position="10 0 0" scale="2 2 2" material="side: double; transparent: true; depthWrite: false" gltf-model="#tree" animation-mixer disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" position="-10 0 0" scale="2 2 2" material="side: double; transparent: true; depthWrite: false" gltf-model="#tree" animation-mixer disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="15 0 -15" scale="3 3 3" material="side: double; transparent: true; depthWrite: false" gltf-model="#tree" animation-mixer disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" position="-15 0 15" scale="3 3 3" material="side: double; transparent: true; depthWrite: false" gltf-model="#tree" animation-mixer disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="0 0 10" scale="2 2 2" material="side: double; transparent: true; depthWrite: false" gltf-model="#tree" animation-mixer disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" position="0 0 -10" scale="3 3 3" material="side: double; transparent: true; depthWrite: false" gltf-model="#tree" animation-mixer disable-culling></a-gltf-model>
        </a-entity>


    </a-scene>
    <canvas id="captureCanvas" style="display:none;"></canvas>
      <div id="whiteScreen"></div>
    <script>
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;

        document.querySelector('a-scene').addEventListener("arReady", (event) => {
            console.log("A-Frame MindAR ready - camera initialized");
            document.getElementById('loader').style.display = "none";
        });

        const title = document.querySelector('#game-title');

        function myFunction() {
            document.getElementById('center-container').style.display = "none";
            window.isStartGame = true;
            title.style.opacity = '1';

            if (/iPad|iPhone|iPod/.test(userAgent)) {
                DeviceOrientationEvent.requestPermission?.().then(response => {
                    if (response === "granted") {
                        console.log("iOS orientation granted");
                    }
                });
            }
        }

        const marker = document.querySelector('#marker');
        const camera2 = document.querySelector("#myCam");
        const captureBtn = document.getElementById('captureBtn');
        const scene = document.querySelector('a-scene');
        const block = document.getElementById('block');

        let isTrigger = false;
        let isPlaying = false;

        marker.addEventListener("targetFound", event => {
            if (isTrigger === false && isPlaying === false && window.isStartGame) {
                console.log("Marker found");
                title.style.opacity = '0';
                isTrigger = true;
                isPlaying = true;

                block.setAttribute('visible', true);

                // 停止 tracking 減少抖動
                const sceneEl = document.querySelector('a-scene');
                const arSystem = sceneEl.systems["mindar-image-system"];
                arSystem.pause(true);

                setTimeout(() => {
                    camera2.setAttribute("look-controls", "enabled: true");
                    captureBtn.style.display = "block";
                }, 100);
            }
        });

        captureBtn.addEventListener('click', () => {
            const captureCanvas = document.getElementById('captureCanvas');
            const ctx = captureCanvas.getContext('2d');

            let webcamVideo = null;
            document.querySelectorAll('video').forEach(v => {
                if (v.srcObject instanceof MediaStream) {
                    webcamVideo = v;
                }
            });

            if (!scene || !webcamVideo) {
                console.warn("Missing scene or webcam for capture");
                return;
            }

            // 計算輸出大小：用 devicePixelRatio 放大（S23 Ultra ~3x）
            const dpr = (window.devicePixelRatio /2) || 2;
            const scaleFactor = 2;  // 可調高到 2.5 或 3，視效能

            // 用 CSS 大小作為 base（更準確）
            const baseWidth = scene.clientWidth;
            const baseHeight = scene.clientHeight;

            const outputWidth = Math.floor(baseWidth * dpr * scaleFactor);
            const outputHeight = Math.floor(baseHeight * dpr * scaleFactor);

            captureCanvas.width = outputWidth;
            captureCanvas.height = outputHeight;

            // Flash 反饋
      const whiteFlash = document.querySelector('#whiteScreen');
      whiteFlash.style.opacity = 0.7;
      whiteFlash.style.display = 'block';
      setTimeout(() => {
        whiteFlash.style.opacity = 0;
        whiteFlash.style.display = 'none';
      }, 50);

            setTimeout(() => {
                // 先畫 webcam（cover 全畫面）
                if (webcamVideo.videoWidth > 0) {
                    const vidAspect = webcamVideo.videoWidth / webcamVideo.videoHeight;
                    const outAspect = outputWidth / outputHeight;

                    let drawW = outputWidth;
                    let drawH = outputHeight;
                    let offsetX = 0;
                    let offsetY = 0;

                    if (vidAspect > outAspect) {
                        drawW = outputHeight * vidAspect;
                        offsetX = (outputWidth - drawW) / 2;
                    } else {
                        drawH = outputWidth / vidAspect;
                        offsetY = (outputHeight - drawH) / 2;
                    }

                    ctx.drawImage(webcamVideo, offsetX, offsetY, drawW, drawH);
                }

                // 再疊 A-Frame 的 screenshot（自動 upscale）
                const glCanvas = scene.components.screenshot.getCanvas('perspective');
                ctx.drawImage(glCanvas, 0, 0, outputWidth, outputHeight);

                const dataURL = captureCanvas.toDataURL('image/png');

                const link = document.createElement('a');
                link.download = `hsk-ar-capture-${Date.now()}.png`;
                link.href = dataURL;
                link.click();
            }, 60);
        });
    </script>
</body>

</html>
