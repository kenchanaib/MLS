<html>

<head>
    <meta property="og:site_name" content="Ma Liu Shui - CLC">
    <meta property="og:title" content="Ma Liu Shui - CLC">
    <meta property="og:description" content="Ma Liu Shui - CLC - AR Game">
    <meta property="og:type" content="website">
    <meta property="og:image:alt" content="AR Game">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="images/icon.png" type="image/jpeg" sizes="48x48">
    <link rel="preload" href="marker/4_2_3.mind" as="fetch" type="application/octet-stream" crossorigin>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <title>Ma Liu Shui - CLC - AR Game</title>
    <script src="js/aframe.min.js"></script>
    <script src="js/mindar-image-aframe.prod.js"></script>
    <script src="js/aframe-extras.min.js"></script>
    <script src="js/index.js?v=1"></script>
    <style>
    </style>
</head>

<body style='margin : 0px; overflow: hidden;'>
    <div id="loader" class="arjs-loader">
        <div class="loading-dots">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>
    <div id="center-container">
        <img id="landingPage" src="images/bg.jpg">
        <div class="language-selector">
            <img id="home_title" src="images/home_title.png">
            <div class="language-selector2">
                <button id="myButton">
                    <img id="startBtn" src="images/tc.png" alt="">
                </button>
                <button id="myButton">
                    <img id="startBtn" src="images/sc.png" alt="">
                </button>
                <button id="myButton">
                    <img id="startBtn" src="images/en.png" alt="">
                </button>
            </div>
        </div>
        <div id="notice-container">
            <div id="notice_page">請使用手機遊玩，以獲得最佳遊戲體驗。<br> For the best experience, please play on a mobile device.</div>
        </div>
    </div>

      <video id="fullscreen-video" autoplay preload="auto" muted playsinline>
        <!-- <source src="Banana.webm" type="video/webm">   -->
        <source src="video/Flower_Lion_1.mov?v=1" type='video/mp4; codecs="hvc1"'>
        <source src="video/Flower_Lion_1.webm?v=1" type="video/webm"> 
        Your browser does not support the video tag.
    </video>

    <button id="captureBtn">
        <img src="images/photo.png" alt="Capture Photo" style="width:100%; height:100%; object-fit: contain;">
    </button>
    <button id="switchCameraBtn" title="Switch Camera">
        <img src="images/switch.png" alt="Switch Camera" style="width: 50px; height: 50px; object-fit: contain;">
    </button>
    <div id="container">
    </div>

    <img id="game-title" src="images/title.png" alt="Game Title">
    <img id="textbox" src="">
    <img id="frameHints" src="images/frame.png">
    <a-scene id="arScene" mindar-image="imageTargetSrc: marker/4_2_3.mind;autoStart:true;uiLoading: no;maxTrack: 1; uiScanning:no;filterMinCF:0.0001;filterBeta:10000;"
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights;logarithmicDepthBuffer:true"
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <a-asset-item id="tree" src="./FlowerFalling/Flowerfall_70Particle.gltf"></a-asset-item>
        </a-assets>

        <a-camera id="myCam" position="0 0 -4" look-controls="enabled: false; touchEnabled: false; mouseEnabled: false">
        </a-camera>

        <a-entity id="marker" mindar-image-target="targetIndex: 0" rotation="0 0 0">
        </a-entity>

        <a-entity id="model" visible="false" rotation="0 180 0">
            <a-gltf-model id="block" visible="true" position="10 -16 25" scale="4 4 4" gltf-model="#tree"
                animation-mixer="timeScale:0.2" disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" position="-10 -16 25" scale="2 2 2" gltf-model="#tree"
                animation-mixer="timeScale:0.35" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="15 -16 -10" scale="3 3 3" gltf-model="#tree"
                animation-mixer="timeScale:0.3" disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" position="-15 -16 10" scale="3 3 3" gltf-model="#tree"
                animation-mixer="timeScale:0.4" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="0 -16 15" scale="4 4 4" gltf-model="#tree"
                animation-mixer="timeScale:0.3" disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" position="0 -16 -15" scale="3 3 3" gltf-model="#tree"
                animation-mixer="timeScale:0.35" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="10 -16 25" scale="5 5 5" gltf-model="#tree"
                animation-mixer="timeScale:0.3" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="2 -16 -14" scale="5 5 5" gltf-model="#tree"
                animation-mixer="timeScale:0.3" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="-10 -16 25" scale="6 6 6" gltf-model="#tree"
                animation-mixer="timeScale:0.35" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="14 -16 -11" scale="7 7 7" gltf-model="#tree"
                animation-mixer="timeScale:0.2" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="4 -25 -11" scale="7 7 7" gltf-model="#tree"
                animation-mixer="timeScale:0.2" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="-14 -16 11" scale="8 8 8" gltf-model="#tree"
                animation-mixer="timeScale:0.25" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="6 -30 -21" scale="8 8 8" gltf-model="#tree"
                animation-mixer="timeScale:0.25" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="36 -30 -21" scale="8 8 8" gltf-model="#tree"
                animation-mixer="timeScale:0.25" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" position="2 -16 16" scale="5 5 5" gltf-model="#tree"
                animation-mixer="timeScale:0.25" disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" position="2 -16 -16" scale="6 6 6" gltf-model="#tree"
                animation-mixer="timeScale:0.35" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" rotation="0 40 0" position="-10 -26 25" scale="8 8 8"
                gltf-model="#tree" animation-mixer="timeScale:0.25" disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" rotation="0 20 0" position="10 -26 25" scale="7 7 7"
                gltf-model="#tree" animation-mixer="timeScale:0.3" disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" rotation="0 -20 0" position="-10 -26 25" scale="8 8 8"
                gltf-model="#tree" animation-mixer="timeScale:0.4" disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" rotation="0 -40 0" position="-10 -26 25" scale="8 8 8"
                gltf-model="#tree" animation-mixer="timeScale:0.35" disable-culling></a-gltf-model>

            <a-gltf-model id="block" visible="true" rotation="0 45 0" position="-10 -35 25" scale="8 8 8"
                gltf-model="#tree" animation-mixer="timeScale:0.35" disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" rotation="0 25 0" position="10 -35 25" scale="7 7 7"
                gltf-model="#tree" animation-mixer="timeScale:0.4" disable-culling></a-gltf-model>
            <a-gltf-model id="block" visible="true" rotation="0 -25 0" position="-10 -45 25" scale="8 8 8"
                gltf-model="#tree" animation-mixer="timeScale:0.25" disable-culling></a-gltf-model>
        </a-entity>


    </a-scene>
    <canvas id="captureCanvas" style="display:none;"></canvas>
    <div id="whiteScreen"></div>
</body>

</html>
